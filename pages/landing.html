<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchella</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="landing-page">
    <a href="../docs/index.html"
        style="
            position: fixed;
            top: 20px;
            right: 24px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 999px;
            font-size: 0.85rem;
            color: var(--color-text-muted);
            transition: all 180ms ease;
            z-index: 100;
            text-decoration: none;"
        onmouseover="this.style.background='rgba(124,58,237,0.15)'; this.style.color='var(--color-accent)'; this.style.borderColor='rgba(124,58,237,0.3)'"
        onmouseout="this.style.background='rgba(255,255,255,0.05)'; this.style.color='var(--color-text-muted)'; this.style.borderColor='rgba(255,255,255,0.1)'">
        📖 Docs
    </a>
    <main class="landing-main">
        <div class="landing-inner">

            <div class="landing-logo">
                <img src="../images/blockchellalogo.svg" alt="Blockchella">
            </div>

            <h1 class="landing-heading">Who are you?</h1>
            <p class="landing-sub">Choose your role to get started</p>

            <div class="role-cards-container">

                <!-- Attendee -->
                <div class="role-card role-card-attendee">
                    <div class="role-icon">🎟</div>
                    <h2>I'm Attending</h2>
                    <p>Buy tickets, join groups, check your ticket status</p>
                    <a href="home.html" class="btn btn-primary" style="margin-top: 24px; width: 100%;">Enter</a>
                </div>

                <!-- Doorman -->
                <div class="role-card role-card-doorman">
                    <div class="role-icon">🚪</div>
                    <h2>I'm at the Door</h2>
                    <p>Verify ticket holders at the venue entrance</p>
                    <a href="verify.html" class="btn btn-doorman" style="margin-top: 24px; width: 100%;">Enter</a>
                </div>

                <!-- Venue -->
                <div class="role-card role-card-venue">
                    <div class="role-icon">🏟</div>
                    <h2>I'm the Venue</h2>
                    <p>Admin panel, sales stats, withdraw funds</p>
                    <a href="admin.html" class="btn btn-venue" style="margin-top: 24px; width: 100%;">Enter</a>
                    <p class="role-card-note">Requires contract owner wallet</p>
                </div>

            </div>
        </div>
    </main>
</body>
</html>
